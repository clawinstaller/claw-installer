name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Build Release
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          swift build -c release

          # Create app bundle structure
          mkdir -p ClawInstaller.app/Contents/MacOS
          mkdir -p ClawInstaller.app/Contents/Resources
          cp .build/release/ClawInstaller ClawInstaller.app/Contents/MacOS/

          # Copy app icon if it exists
          if [ -f Sources/ClawInstaller/Resources/AppIcon.icns ]; then
            cp Sources/ClawInstaller/Resources/AppIcon.icns ClawInstaller.app/Contents/Resources/
          fi

          cat > ClawInstaller.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>ClawInstaller</string>
              <key>CFBundleIdentifier</key>
              <string>ai.openclaw.installer</string>
              <key>CFBundleName</key>
              <string>ClawInstaller</string>
              <key>CFBundleDisplayName</key>
              <string>ClawInstaller</string>
              <key>CFBundleShortVersionString</key>
              <string>VERSION_PLACEHOLDER</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSApplicationCategoryType</key>
              <string>public.app-category.developer-tools</string>
          </dict>
          </plist>
          PLIST

          # Replace version placeholder
          sed -i '' "s/VERSION_PLACEHOLDER/$VERSION/" ClawInstaller.app/Contents/Info.plist

          echo -n "APPL????" > ClawInstaller.app/Contents/PkgInfo

      - name: Code Sign (ad-hoc)
        run: |
          # Ad-hoc sign the app bundle
          codesign --force --deep --sign - ClawInstaller.app

          # Verify the signature
          codesign --verify --verbose ClawInstaller.app

      - name: Create DMG
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          # Create a temporary directory for DMG contents
          mkdir -p dmg-staging
          cp -R ClawInstaller.app dmg-staging/

          # Create a symlink to /Applications for drag-and-drop install
          ln -s /Applications dmg-staging/Applications

          # Create DMG
          hdiutil create -volname "ClawInstaller" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "ClawInstaller-${VERSION}-macos.dmg"

          # Also create ZIP for Homebrew cask compatibility
          zip -r "ClawInstaller-${VERSION}-macos.zip" ClawInstaller.app

          # Checksums
          shasum -a 256 "ClawInstaller-${VERSION}-macos.dmg" > "ClawInstaller-${VERSION}-macos.dmg.sha256"
          shasum -a 256 "ClawInstaller-${VERSION}-macos.zip" > "ClawInstaller-${VERSION}-macos.zip.sha256"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClawInstaller-*-macos.dmg
            ClawInstaller-*-macos.dmg.sha256
            ClawInstaller-*-macos.zip
            ClawInstaller-*-macos.zip.sha256
          body_path: release/RELEASE_NOTES.md
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
